---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scarabeo-search-config
  namespace: scarabeo
data:
  HOST: "0.0.0.0"
  PORT: "8002"
  LOG_LEVEL: "INFO"
  METRICS_ENABLED: "true"
  AUTH_MODE: "header"
  SEARCH_BACKEND: "postgres"
  MAX_PAGE_SIZE: "100"
  DEFAULT_PAGE_SIZE: "20"
---
apiVersion: v1
kind: Secret
metadata:
  name: scarabeo-search-secret
  namespace: scarabeo
type: Opaque
stringData:
  DATABASE_URL: "postgresql://scarabeo:$(POSTGRES_PASSWORD)@postgres:5432/scarabeo"
  REDIS_URL: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scarabeo-search
  namespace: scarabeo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
    spec:
      containers:
        - name: search
          image: scarabeo/search:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
              name: http
          envFrom:
            - configMapRef:
                name: scarabeo-search-config
            - secretRef:
                name: scarabeo-search-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: search
  namespace: scarabeo
spec:
  selector:
    app: search
  ports:
    - port: 8002
      targetPort: 8002
      name: http
  type: ClusterIP
