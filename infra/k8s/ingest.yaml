---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scarabeo-ingest-config
  namespace: scarabeo
data:
  HOST: "0.0.0.0"
  PORT: "8000"
  LOG_LEVEL: "INFO"
  METRICS_ENABLED: "true"
  AUTH_MODE: "header"
  RATE_LIMIT_UPLOADS_PER_MINUTE: "60"
  RATE_LIMIT_CONCURRENT_JOBS: "10"
  MAX_UPLOAD_SIZE_MB: "50"
---
apiVersion: v1
kind: Secret
metadata:
  name: scarabeo-ingest-secret
  namespace: scarabeo
type: Opaque
stringData:
  DATABASE_URL: "postgresql://scarabeo:$(POSTGRES_PASSWORD)@postgres:5432/scarabeo"
  REDIS_URL: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
  S3_ENDPOINT_URL: "http://minio:9000"
  S3_ACCESS_KEY: "$(MINIO_ROOT_USER)"
  S3_SECRET_KEY: "$(MINIO_ROOT_PASSWORD)"
  S3_BUCKET: "scarabeo-samples"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scarabeo-ingest
  namespace: scarabeo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      containers:
        - name: ingest
          image: scarabeo/ingest:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: scarabeo-ingest-config
            - secretRef:
                name: scarabeo-ingest-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ingest
  namespace: scarabeo
spec:
  selector:
    app: ingest
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
