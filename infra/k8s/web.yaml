---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scarabeo-web-config
  namespace: scarabeo
data:
  HOST: "0.0.0.0"
  PORT: "8080"
  LOG_LEVEL: "INFO"
  INGEST_API_URL: "http://ingest:8000"
  SEARCH_API_URL: "http://search:8002"
  AUTH_MODE: "header"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scarabeo-web
  namespace: scarabeo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: scarabeo/web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: scarabeo-web-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: scarabeo
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: scarabeo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: scarabeo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
