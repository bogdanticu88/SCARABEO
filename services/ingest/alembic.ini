# Alembic configuration

[alembic]
script_location = services/ingest/alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql://scarabeo:scarabeo_dev_password@localhost:5432/scarabeo

# Migration safety guard
# Set to 'true' to allow automatic migrations (NOT RECOMMENDED for production)
# Set to 'false' to require explicit 'alembic upgrade head' command
auto_migrate = false

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
